<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticky – What I Do</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f3ee;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
.stage{position:relative;width:780px;height:520px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.08);overflow:hidden}
.ground{position:absolute;bottom:0;width:100%;height:50px;background:#e8e4da}
.controls{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-wrap:wrap;justify-content:center;gap:5px;width:95%}
.controls button{padding:5px 12px;border:2px solid #333;border-radius:20px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.controls button:hover{background:#333;color:#fff}
.controls button.active{background:#C8D64B;border-color:#C8D64B;color:#222}
.scene-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;color:#999;letter-spacing:2px;text-transform:uppercase;text-align:center;width:90%}
svg.character{position:absolute;bottom:45px;width:140px;height:210px}
#bubble{position:absolute;top:30px;right:40px;max-width:280px;background:#fff;border:3px solid #222;border-radius:18px;padding:10px 16px;font-size:13px;font-weight:600;color:#222;opacity:0;transform:scale(0);transition:all .3s cubic-bezier(.34,1.56,.64,1);line-height:1.4;z-index:5}
.scene-objects{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}
.obj{position:absolute;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.obj.show{opacity:1;transform:scale(1)!important}

/* Floating icons */
.icon-box{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid #222;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.icon-box.green{background:#C8D64B}
.icon-box.blue{background:#7EC8E3}
.icon-box.orange{background:#F4A940}
.icon-box.purple{background:#C4A7E7}
.icon-box.red{background:#E87461}
.icon-box.teal{background:#6ECFBD}

/* Connection lines */
.conn-line{position:absolute;height:3px;background:#222;transform-origin:left center;border-radius:2px}

/* Labels under icons */
.icon-label{position:absolute;font-size:10px;font-weight:700;color:#555;text-align:center;width:80px;letter-spacing:.5px}
</style>
</head>
<body>
<div class="stage">
  <div class="scene-label" id="label">SELECT AN ACTIVITY</div>
  <div class="ground"></div>
  <div class="scene-objects" id="sceneObjects"></div>

  <svg class="character" id="sticky" viewBox="0 0 160 240" fill="none" xmlns="http://www.w3.org/2000/svg" style="left:60px">
    <circle id="head" cx="80" cy="50" r="32" stroke="#222" stroke-width="5" fill="#fff"/>
    <line x1="72" y1="20" x2="68" y2="8" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <line x1="80" y1="18" x2="80" y2="5" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <line x1="88" y1="20" x2="92" y2="10" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <circle id="eyeL" cx="70" cy="46" r="3" fill="#222"/>
    <circle id="eyeR" cx="90" cy="46" r="3" fill="#222"/>
    <path id="mouth" d="M68 58 Q80 70 92 58" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon id="body" points="80,82 50,165 110,165" fill="#C8D64B" stroke="#222" stroke-width="5" stroke-linejoin="round"/>
    <path id="armL" d="M58,105 Q30,110 20,130" stroke="#222" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path id="armR" d="M102,105 Q130,100 140,80" stroke="#222" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path id="thumb" d="M140,80 L137,72" stroke="#222" stroke-width="4" fill="none" stroke-linecap="round"/>
    <line id="legL" x1="65" y1="165" x2="55" y2="220" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line id="legR" x1="95" y1="165" x2="105" y2="220" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line x1="55" y1="220" x2="45" y2="222" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <line x1="105" y1="220" x2="115" y2="222" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <circle id="blinkL" cx="70" cy="46" r="3" fill="#fff" opacity="0"/>
    <line id="blinkLineL" x1="65" y1="46" x2="75" y2="46" stroke="#222" stroke-width="3" stroke-linecap="round" opacity="0"/>
    <circle id="blinkR" cx="90" cy="46" r="3" fill="#fff" opacity="0"/>
    <line id="blinkLineR" x1="85" y1="46" x2="95" y2="46" stroke="#222" stroke-width="3" stroke-linecap="round" opacity="0"/>
  </svg>

  <div id="bubble"></div>

  <div class="controls">
    <button onclick="play('bridge')" id="b1">🔗 Bridge Role</button>
    <button onclick="play('focus')" id="b2">👥 Focus Groups</button>
    <button onclick="play('iot')" id="b3">📡 IoT Expert</button>
    <button onclick="play('ivv')" id="b4">📋 IVV Regulation</button>
    <button onclick="play('api')" id="b5">⚙️ API Integration</button>
    <button onclick="play('pbi')" id="b6">📊 Power BI</button>
  </div>
</div>

<script>
const sticky = document.getElementById('sticky');
const label = document.getElementById('label');
const bubble = document.getElementById('bubble');
const sceneObjects = document.getElementById('sceneObjects');
const armL = document.getElementById('armL');
const armR = document.getElementById('armR');
const thumb = document.getElementById('thumb');
const mouth = document.getElementById('mouth');
const eyeL = document.getElementById('eyeL');
const eyeR = document.getElementById('eyeR');
const blinkL = document.getElementById('blinkL');
const blinkR = document.getElementById('blinkR');
const blinkLineL = document.getElementById('blinkLineL');
const blinkLineR = document.getElementById('blinkLineR');

let animId = null;
let timeouts = [];

// Blink
setInterval(() => {
  blinkL.style.opacity='1'; blinkR.style.opacity='1';
  blinkLineL.style.opacity='1'; blinkLineR.style.opacity='1';
  eyeL.style.opacity='0'; eyeR.style.opacity='0';
  setTimeout(()=>{
    blinkL.style.opacity='0'; blinkR.style.opacity='0';
    blinkLineL.style.opacity='0'; blinkLineR.style.opacity='0';
    eyeL.style.opacity='1'; eyeR.style.opacity='1';
  },120);
}, 3000);

function clearAll() {
  cancelAnimationFrame(animId);
  timeouts.forEach(t=>clearTimeout(t));
  timeouts=[];
  sceneObjects.innerHTML='';
  bubble.style.opacity='0'; bubble.style.transform='scale(0)';
  sticky.style.transform='';
  sticky.style.transition='none';
  sticky.style.left='60px';
  armL.setAttribute('d','M58,105 Q30,110 20,130');
  armR.setAttribute('d','M102,105 Q130,100 140,80');
  thumb.setAttribute('d','M140,80 L137,72');
  thumb.style.opacity='1';
  mouth.setAttribute('d','M68 58 Q80 70 92 58');
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
}

function showBubble(html,delay=0){
  timeouts.push(setTimeout(()=>{
    bubble.innerHTML=html;
    bubble.style.opacity='1';bubble.style.transform='scale(1)';
  },delay));
}

function addObj(id,x,y,content,cls='',delay=0){
  const d=document.createElement('div');
  d.className='obj';
  d.id=id;
  d.style.left=x+'px';d.style.top=y+'px';
  d.style.transform='scale(0)';
  d.innerHTML=content;
  sceneObjects.appendChild(d);
  timeouts.push(setTimeout(()=>d.classList.add('show'),delay));
  return d;
}

function play(scene){
  clearAll();
  document.getElementById({bridge:'b1',focus:'b2',iot:'b3',ivv:'b4',api:'b5',pbi:'b6'}[scene])?.classList.add('active');
  scenes[scene]();
}

function gesturePoint(t){
  const s=Math.sin(t*2)*8;
  armR.setAttribute('d',`M102,105 Q135,85 ${148+s},${70+Math.cos(t*2)*5}`);
  thumb.setAttribute('d',`M${148+s},${70+Math.cos(t*2)*5} L${146+s},${62+Math.cos(t*2)*5}`);
}

const scenes = {

  bridge() {
    label.textContent='BRIDGE — MANAGEMENT ↔ COMMITTEES';
    // Management box top-left
    addObj('mgmt',340,70,`<div class="icon-box orange">🏢</div><div class="icon-label" style="margin-top:4px">Management</div>`,'',200);
    // Quality dept
    addObj('qual',520,70,`<div class="icon-box green">✅</div><div class="icon-label" style="margin-top:4px">Quality Dept</div>`,'',400);
    // Committees
    addObj('com1',340,220,`<div class="icon-box blue">📝</div><div class="icon-label" style="margin-top:4px">Committee A</div>`,'',600);
    addObj('com2',450,260,`<div class="icon-box blue">📝</div><div class="icon-label" style="margin-top:4px">Committee B</div>`,'',700);
    addObj('com3',560,220,`<div class="icon-box purple">🌐</div><div class="icon-label" style="margin-top:4px">Cross-func.</div>`,'',800);

    // Animated connector lines appear
    timeouts.push(setTimeout(()=>{
      const lines = [
        {x:200,y:180,w:160,a:-30},{x:200,y:190,w:180,a:10},
        {x:200,y:185,w:200,a:20},{x:200,y:175,w:370,a:-2},{x:200,y:185,w:400,a:12}
      ];
      lines.forEach((l,i)=>{
        const el=document.createElement('div');
        el.className='conn-line';
        el.style.cssText=`left:${l.x}px;top:${l.y}px;width:0;transform:rotate(${l.a}deg);transition:width .6s ease ${i*0.12}s;border-style:dashed;border-width:0;border-top:2px dashed #C8D64B;height:0;background:none`;
        sceneObjects.appendChild(el);
        requestAnimationFrame(()=>el.style.width=l.w+'px');
      });
    },900));

    // Sticky points
    let t=0;
    function anim(){
      t+=0.04;
      gesturePoint(t);
      armL.setAttribute('d',`M58,105 Q${30+Math.sin(t*1.3)*5},110 20,${125+Math.sin(t)*8}`);
      if(t<12) animId=requestAnimationFrame(anim);
    }
    anim();

    showBubble('I act as the <b>link</b> between management, quality committees, and cross-functional teams.',500);
  },

  focus() {
    label.textContent='FOCUS GROUPS — PROCESSES, METHODS & TOOLS';
    // Center group circles
    const groups=[
      {e:'🔧',l:'Processes',x:350,y:80,c:'green',d:200},
      {e:'📐',l:'Methods',x:500,y:80,c:'blue',d:400},
      {e:'🛠️',l:'Tools',x:650,y:80,c:'orange',d:600},
      {e:'📜',l:'Regulations',x:420,y:220,c:'purple',d:800},
      {e:'🎯',l:'Objectives',x:570,y:220,c:'red',d:900},
    ];
    groups.forEach(g=>{
      addObj('fg_'+g.l,g.x,g.y,`<div class="icon-box ${g.c}">${g.e}</div><div class="icon-label" style="margin-top:4px">${g.l}</div>`,'',g.d);
    });

    // Arrows showing alignment
    timeouts.push(setTimeout(()=>{
      const arrow=document.createElement('div');
      arrow.style.cssText='position:absolute;left:420px;top:170px;font-size:28px;color:#C8D64B;opacity:0;transition:opacity .4s';
      arrow.textContent='⟱  aligned  ⟱';
      arrow.style.fontWeight='800';arrow.style.fontSize='14px';arrow.style.color='#999';arrow.style.letterSpacing='3px';
      sceneObjects.appendChild(arrow);
      requestAnimationFrame(()=>arrow.style.opacity='1');
    },1000));

    let t=0;
    function anim(){
      t+=0.04;
      // Conductor gesture — both arms moving
      armR.setAttribute('d',`M102,105 Q130,${90+Math.sin(t*2)*15} 145,${75+Math.sin(t*2)*20}`);
      armL.setAttribute('d',`M58,105 Q30,${90+Math.cos(t*2)*15} 15,${75+Math.cos(t*2)*20}`);
      thumb.style.opacity='0';
      if(t<12) animId=requestAnimationFrame(anim);
    }
    anim();

    showBubble('I coordinate <b>focus groups</b> that develop and improve processes, methods & tools — aligned with regulations and objectives.',500);
  },

  iot() {
    label.textContent='IoT EXPERT — DIRECT CONTRIBUTION';
    // IoT ecosystem
    addObj('iot1',320,60,`<div class="icon-box teal" style="width:70px;height:70px;font-size:34px">📡</div><div class="icon-label" style="margin-top:4px">Sensors</div>`,'',200);
    addObj('iot2',480,55,`<div class="icon-box blue" style="width:70px;height:70px;font-size:34px">☁️</div><div class="icon-label" style="margin-top:4px">Cloud</div>`,'',400);
    addObj('iot3',640,60,`<div class="icon-box green" style="width:70px;height:70px;font-size:34px">📱</div><div class="icon-label" style="margin-top:4px">Apps</div>`,'',600);

    // Connection arrows
    timeouts.push(setTimeout(()=>{
      ['400,95,60','560,95,60'].forEach((v,i)=>{
        const [x,y,w]=v.split(',');
        const el=document.createElement('div');
        el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:0;height:3px;background:#6ECFBD;transition:width .5s ease ${i*.2}s;border-radius:2px`;
        sceneObjects.appendChild(el);
        requestAnimationFrame(()=>el.style.width=w+'px');
      });
    },700));

    // Data flow particles
    timeouts.push(setTimeout(()=>{
      for(let i=0;i<6;i++){
        const dot=document.createElement('div');
        dot.style.cssText=`position:absolute;width:8px;height:8px;border-radius:50%;background:#C8D64B;top:${90+Math.random()*10}px;left:${390+Math.random()*230}px;opacity:0;animation:pulse 1.5s ease ${i*.3}s infinite`;
        sceneObjects.appendChild(dot);
      }
      const style=document.createElement('style');
      style.textContent='@keyframes pulse{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(0)}}';
      sceneObjects.appendChild(style);
    },900));

    // Expert badge
    addObj('badge',380,200,`<div style="background:#222;color:#C8D64B;padding:10px 24px;border-radius:30px;font-weight:800;font-size:14px;letter-spacing:1px">⚡ IoT EXPERT</div>`,'',1000);

    let t=0;
    function anim(){
      t+=0.05;
      gesturePoint(t);
      if(t<12) animId=requestAnimationFrame(anim);
    }
    anim();

    showBubble('I contribute directly as an <b>expert in the IoT space</b> — sensors, cloud, and connected applications.',500);
  },

  ivv() {
    label.textContent='IVV — INTEGRATION, VERIFICATION & VALIDATION';
    // The "House of IVV"
    timeouts.push(setTimeout(()=>{
      const house=document.createElement('div');
      house.style.cssText='position:absolute;left:320;top:50px;width:380px;height:280px;';
      house.innerHTML=`
        <svg viewBox="0 0 380 280" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Roof -->
          <polygon points="190,10 30,100 350,100" fill="#C8D64B" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
          <text x="190" y="75" text-anchor="middle" font-size="16" font-weight="800" fill="#222">THE HOUSE OF IVV</text>
          <!-- Pillars -->
          <rect x="60" y="105" width="75" height="140" rx="4" fill="#7EC8E3" stroke="#222" stroke-width="3"/>
          <text x="97" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Integration</text>
          <rect x="153" y="105" width="75" height="140" rx="4" fill="#F4A940" stroke="#222" stroke-width="3"/>
          <text x="190" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Verification</text>
          <rect x="246" y="105" width="75" height="140" rx="4" fill="#C4A7E7" stroke="#222" stroke-width="3"/>
          <text x="283" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Validation</text>
          <!-- Foundation -->
          <rect x="40" y="250" width="300" height="28" rx="4" fill="#e8e4da" stroke="#222" stroke-width="3"/>
          <text x="190" y="269" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Requirements & Foundations</text>
        </svg>
      `;
      house.style.opacity='0';house.style.transition='opacity .8s ease';
      sceneObjects.appendChild(house);
      requestAnimationFrame(()=>house.style.opacity='1');
    },300));

    let t=0;
    function anim(){
      t+=0.04;
      // Presenting gesture
      armR.setAttribute('d',`M102,105 Q140,90 155,${85+Math.sin(t*1.5)*5}`);
      thumb.style.opacity='0';
      armL.setAttribute('d','M58,105 Q35,115 28,135');
      if(t<14) animId=requestAnimationFrame(anim);
    }
    anim();

    showBubble('I led the creation of our <b>IVV regulation</b> — providing general requirements for Integration, Verification & Validation.',600);
  },

  api() {
    label.textContent='API INTEGRATION — OPERATIONAL LEVEL';
    // App boxes connected by API lines
    const apps=[
      {e:'📦',l:'App 1',x:330,y:60,c:'blue'},
      {e:'📦',l:'App 2',x:500,y:60,c:'orange'},
      {e:'📦',l:'App 3',x:660,y:60,c:'purple'},
    ];
    apps.forEach((a,i)=>{
      addObj('app'+i,a.x,a.y,`<div class="icon-box ${a.c}">${a.e}</div><div class="icon-label" style="margin-top:4px">${a.l}</div>`,'',200+i*200);
    });

    // API hub
    addObj('hub',490,190,`<div style="background:#222;color:#C8D64B;padding:14px 28px;border-radius:12px;font-weight:800;font-size:16px;letter-spacing:2px;border:3px solid #C8D64B">⚙️ APIs</div>`,'',800);

    // Automated gear
    addObj('auto',480,280,`<div style="background:#fff;border:3px solid #222;border-radius:12px;padding:8px 16px;font-weight:700;font-size:12px;color:#222">🤖 Automated Solutions</div>`,'',1100);

    // Connection lines
    timeouts.push(setTimeout(()=>{
      const style=document.createElement('style');
      style.textContent='@keyframes flowDown{0%{height:0}100%{height:40px}} .api-line{position:absolute;width:3px;background:#C8D64B;animation:flowDown .5s ease forwards}';
      sceneObjects.appendChild(style);
      [370,540,700].forEach((x,i)=>{
        const el=document.createElement('div');
        el.className='api-line';
        el.style.cssText=`left:${x}px;top:140px;animation-delay:${i*.15}s`;
        sceneObjects.appendChild(el);
      });
      // Down to hub
      const el2=document.createElement('div');
      el2.className='api-line';
      el2.style.cssText='left:520px;top:240px;animation-delay:.6s';
      sceneObjects.appendChild(el2);
    },900));

    let t=0;
    function anim(){
      t+=0.05;
      gesturePoint(t);
      if(t<12) animId=requestAnimationFrame(anim);
    }
    anim();

    showBubble('We integrated several applications at the operational level, enabling <b>APIs</b> and <b>automated solutions</b>.',500);
  },

  pbi() {
    label.textContent='POWER BI — ADVANCED REPORTING';
    // Data flow: Data → Power BI → Solutions
    addObj('data',310,70,`<div class="icon-box green" style="width:70px;height:70px;font-size:32px">🗄️</div><div class="icon-label" style="margin-top:4px">Data Layer</div>`,'',200);
    addObj('pbi',490,65,`<div class="icon-box orange" style="width:80px;height:80px;font-size:38px">📊</div><div class="icon-label" style="margin-top:4px;font-size:11px"><b>Power BI</b></div>`,'',500);

    // Multiple solutions branching out
    const sols=[
      {e:'📈',l:'Dashboards',x:620,y:30,d:800},
      {e:'🔔',l:'Alerts',x:680,y:130,d:900},
      {e:'🧩',l:'New Solutions',x:620,y:230,d:1000},
    ];
    sols.forEach((s,i)=>{
      addObj('sol'+i,s.x,s.y,`<div class="icon-box teal" style="width:50px;height:50px;font-size:22px">${s.e}</div><div class="icon-label" style="margin-top:3px;font-size:9px">${s.l}</div>`,'',s.d);
    });

    // Flow arrows
    timeouts.push(setTimeout(()=>{
      const style=document.createElement('style');
      style.textContent='@keyframes flowRight{0%{width:0}100%{width:50px}} .flow-arrow{position:absolute;height:3px;background:#F4A940;animation:flowRight .4s ease forwards}';
      sceneObjects.appendChild(style);
      const el=document.createElement('div');
      el.className='flow-arrow';
      el.style.cssText='left:400px;top:100px;animation-delay:.3s';
      sceneObjects.appendChild(el);
    },600));

    // Animated bar chart inside a mini card
    timeouts.push(setTimeout(()=>{
      const chart=document.createElement('div');
      chart.style.cssText='position:absolute;left:370;top:200px;display:flex;align-items:flex-end;gap:6px;height:80px;padding:8px 12px;background:#fff;border:2px solid #ddd;border-radius:10px';
      const colors=['#C8D64B','#7EC8E3','#F4A940','#C4A7E7','#E87461'];
      for(let i=0;i<5;i++){
        const bar=document.createElement('div');
        const h=20+Math.random()*50;
        bar.style.cssText=`width:14px;height:0;background:${colors[i]};border-radius:3px 3px 0 0;transition:height .6s ease ${i*.1}s`;
        chart.appendChild(bar);
        requestAnimationFrame(()=>bar.style.height=h+'px');
      }
      sceneObjects.appendChild(chart);
    },1100));

    let t=0;
    function anim(){
      t+=0.04;
      armR.setAttribute('d',`M102,105 Q140,90 155,${85+Math.sin(t*1.5)*5}`);
      thumb.style.opacity='0';
      armL.setAttribute('d',`M58,105 Q30,${105+Math.sin(t)*8} 18,${125+Math.sin(t*1.3)*10}`);
      if(t<14) animId=requestAnimationFrame(anim);
    }
    anim();

    showBubble('Improved data provisioning lets us leverage <b>Power BI</b> for advanced reporting — a foundation for even more solutions.',500);
  }
};

// Start with bridge scene
setTimeout(()=>play('bridge'),400);
</script>
</body>
</html>
