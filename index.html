<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticky – What I Do</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f3ee;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:auto}

.page{display:flex;gap:20px;padding:20px;max-width:1200px;width:100%;flex-wrap:wrap;justify-content:center;align-items:flex-start}

/* ---- STAGE ---- */
.stage{position:relative;width:780px;height:480px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.08);overflow:hidden;flex-shrink:0}
.ground{position:absolute;bottom:0;width:100%;height:50px;background:#e8e4da}
.controls{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-wrap:wrap;justify-content:center;gap:5px;width:95%}
.controls button{padding:5px 12px;border:2px solid #333;border-radius:20px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.controls button:hover{background:#333;color:#fff}
.controls button.active{background:#C8D64B;border-color:#C8D64B;color:#222}
.scene-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;color:#999;letter-spacing:2px;text-transform:uppercase;text-align:center;width:90%}
svg.character{position:absolute;bottom:45px;width:140px;height:210px}
#bubble{position:absolute;top:30px;right:40px;max-width:280px;background:#fff;border:3px solid #222;border-radius:18px;padding:10px 16px;font-size:13px;font-weight:600;color:#222;opacity:0;transform:scale(0);transition:all .3s cubic-bezier(.34,1.56,.64,1);line-height:1.4;z-index:5}
.scene-objects{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}
.obj{position:absolute;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.obj.show{opacity:1;transform:scale(1)!important}
.icon-box{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid #222;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.icon-box.green{background:#C8D64B}.icon-box.blue{background:#7EC8E3}.icon-box.orange{background:#F4A940}.icon-box.purple{background:#C4A7E7}.icon-box.red{background:#E87461}.icon-box.teal{background:#6ECFBD}
.icon-label{position:absolute;font-size:10px;font-weight:700;color:#555;text-align:center;width:80px;letter-spacing:.5px}

/* ---- CHAT PANEL ---- */
.chat-panel{width:360px;height:480px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.chat-header{background:#222;color:#C8D64B;padding:14px 18px;font-weight:700;font-size:14px;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.chat-header .dot{width:10px;height:10px;border-radius:50%;background:#C8D64B;animation:blinker 2s ease infinite}
@keyframes blinker{0%,100%{opacity:1}50%{opacity:.3}}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.45;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:#C8D64B;color:#222;border-bottom-right-radius:4px;font-weight:600}
.chat-msg.bot{align-self:flex-start;background:#f0efe9;color:#222;border-bottom-left-radius:4px}
.chat-msg.system{align-self:center;background:none;color:#999;font-size:11px;text-align:center;font-style:italic}
.chat-input-area{display:flex;gap:8px;padding:10px 14px;border-top:2px solid #f0efe9}
.chat-input-area input{flex:1;border:2px solid #ddd;border-radius:20px;padding:8px 14px;font-size:13px;outline:none;font-family:inherit}
.chat-input-area input:focus{border-color:#C8D64B}
.chat-input-area button{border:none;background:#222;color:#C8D64B;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.chat-input-area button:hover{transform:scale(1.1)}
.chat-input-area button:disabled{opacity:.4;cursor:default;transform:none}

/* API key setup */
.api-setup{padding:20px;text-align:center;display:flex;flex-direction:column;gap:12px;flex:1;justify-content:center}
.api-setup label{font-size:12px;font-weight:600;color:#555}
.api-setup input{border:2px solid #ddd;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:inherit;text-align:center}
.api-setup input:focus{border-color:#C8D64B}
.api-setup button{background:#C8D64B;border:2px solid #222;border-radius:20px;padding:8px 18px;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
.api-setup button:hover{background:#222;color:#C8D64B}
.api-setup .hint{font-size:11px;color:#999;line-height:1.4}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing span{width:7px;height:7px;border-radius:50%;background:#bbb;animation:typingDot .8s ease infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes typingDot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

@media(max-width:1200px){
  .page{flex-direction:column;align-items:center}
  .chat-panel{width:780px;height:380px}
}
@media(max-width:800px){
  .stage{width:100%;height:400px}
  .chat-panel{width:100%;height:350px}
}
</style>
</head>
<body>
<div class="page">

<!-- ===== ANIMATION STAGE ===== -->
<div class="stage">
  <div class="scene-label" id="label">SELECT AN ACTIVITY</div>
  <div class="ground"></div>
  <div class="scene-objects" id="sceneObjects"></div>

  <svg class="character" id="sticky" viewBox="0 0 160 240" fill="none" xmlns="http://www.w3.org/2000/svg" style="left:60px">
    <circle id="head" cx="80" cy="50" r="32" stroke="#222" stroke-width="5" fill="#fff"/>
    <line x1="72" y1="20" x2="68" y2="8" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <line x1="80" y1="18" x2="80" y2="5" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <line x1="88" y1="20" x2="92" y2="10" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <circle id="eyeL" cx="70" cy="46" r="3" fill="#222"/>
    <circle id="eyeR" cx="90" cy="46" r="3" fill="#222"/>
    <path id="mouth" d="M68 58 Q80 70 92 58" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon id="body" points="80,82 50,165 110,165" fill="#C8D64B" stroke="#222" stroke-width="5" stroke-linejoin="round"/>
    <path id="armL" d="M58,105 Q30,110 20,130" stroke="#222" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path id="armR" d="M102,105 Q130,100 140,80" stroke="#222" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path id="thumb" d="M140,80 L137,72" stroke="#222" stroke-width="4" fill="none" stroke-linecap="round"/>
    <line id="legL" x1="65" y1="165" x2="55" y2="220" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line id="legR" x1="95" y1="165" x2="105" y2="220" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line x1="55" y1="220" x2="45" y2="222" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <line x1="105" y1="220" x2="115" y2="222" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <circle id="blinkL" cx="70" cy="46" r="3" fill="#fff" opacity="0"/>
    <line id="blinkLineL" x1="65" y1="46" x2="75" y2="46" stroke="#222" stroke-width="3" stroke-linecap="round" opacity="0"/>
    <circle id="blinkR" cx="90" cy="46" r="3" fill="#fff" opacity="0"/>
    <line id="blinkLineR" x1="85" y1="46" x2="95" y2="46" stroke="#222" stroke-width="3" stroke-linecap="round" opacity="0"/>
  </svg>

  <div id="bubble"></div>

  <div class="controls">
    <button onclick="play('bridge')" id="b1">🔗 Bridge Role</button>
    <button onclick="play('focus')" id="b2">👥 Focus Groups</button>
    <button onclick="play('iot')" id="b3">📡 IoT Expert</button>
    <button onclick="play('ivv')" id="b4">📋 IVV Regulation</button>
    <button onclick="play('api')" id="b5">⚙️ API Integration</button>
    <button onclick="play('pbi')" id="b6">📊 Power BI</button>
  </div>
</div>

<!-- ===== CHAT PANEL ===== -->
<div class="chat-panel">
  <div class="chat-header">
    <div class="dot"></div>
    Ask Sticky anything
  </div>

  <!-- API Key Setup -->
  <div class="api-setup" id="apiSetup">
    <div style="font-size:36px">🔑</div>
    <label>Enter your Anthropic API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off"/>
    <button onclick="setApiKey()">Connect</button>
    <div class="hint">Your key is stored <b>only in memory</b> for this session.<br>It is never saved or transmitted elsewhere.<br><br>Get a key at <a href="https://console.anthropic.com" target="_blank" style="color:#C8D64B">console.anthropic.com</a></div>
  </div>

  <!-- Chat area (hidden until key set) -->
  <div class="chat-messages" id="chatMessages" style="display:none">
    <div class="chat-msg system">Sticky is ready! Ask about my role, IVV, IoT, APIs, or anything else.</div>
  </div>
  <div class="chat-input-area" id="chatInputArea" style="display:none">
    <input type="text" id="chatInput" placeholder="Ask Sticky a question..." onkeydown="if(event.key==='Enter')sendChat()"/>
    <button onclick="sendChat()" id="sendBtn">➤</button>
  </div>
</div>

</div>

<script>
/* ============== API KEY ============== */
let apiKey = '';
function setApiKey(){
  const k = document.getElementById('apiKeyInput').value.trim();
  if(!k){return}
  apiKey = k;
  document.getElementById('apiSetup').style.display='none';
  document.getElementById('chatMessages').style.display='flex';
  document.getElementById('chatInputArea').style.display='flex';
}

/* ============== CHAT ============== */
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
let conversationHistory = [];

const SYSTEM_PROMPT = `You are "Sticky", a friendly stick-figure character who represents a quality and IoT professional. You answer questions in a warm, concise, and knowledgeable way — always in character as Sticky.

Here is the background about the person you represent:

ROLE: Acts as the link between management and various committees within the quality department and cross-functionally. Coordinates several focus groups that contribute to the development and improvement of processes, methods, and tools, ensuring they align with regulations and organizational objectives. Also contributes directly as an expert in the IoT space.

KEY ACHIEVEMENTS:
- Led the creation of a regulation called IVV (Integration, Verification and Validation), which provides general requirements and foundations in these critical areas. This is also known as "The House of IVV."
- Integrated several applications at the operational level, enabling APIs and automated solutions.
- Improved data provisioning to leverage tools like Power BI for advanced reporting, upon which more solutions can be built.

PERSONALITY: Enthusiastic, knowledgeable, uses simple language. Occasionally references being a stick figure. Keep answers concise (2-4 sentences) unless more detail is asked for.

If asked something outside this scope, you can say you're just a stick figure and suggest asking the real person behind you.`;

function addMsg(text, type){
  const d = document.createElement('div');
  d.className = 'chat-msg ' + type;
  d.textContent = text;
  chatMessages.appendChild(d);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return d;
}

function addTyping(){
  const d = document.createElement('div');
  d.className = 'typing';
  d.id = 'typingIndicator';
  d.innerHTML = '<span></span><span></span><span></span>';
  chatMessages.appendChild(d);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function removeTyping(){
  document.getElementById('typingIndicator')?.remove();
}

async function sendChat(){
  const text = chatInput.value.trim();
  if(!text || !apiKey) return;

  chatInput.value = '';
  sendBtn.disabled = true;
  addMsg(text, 'user');

  conversationHistory.push({role:'user', content: text});

  addTyping();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    removeTyping();

    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      const msg = err?.error?.message || `Error ${resp.status}`;
      addMsg('Oops! ' + msg, 'system');
      sendBtn.disabled = false;
      return;
    }

    const data = await resp.json();
    const reply = data.content?.map(c => c.text || '').join('') || 'Hmm, I seem to have lost my pen...';

    conversationHistory.push({role:'assistant', content: reply});
    addMsg(reply, 'bot');

    // Trigger a little wave animation on Sticky when answering
    triggerTalkGesture();

  } catch(e) {
    removeTyping();
    addMsg('Connection error — check your API key and try again.', 'system');
  }

  sendBtn.disabled = false;
  chatInput.focus();
}

/* ============== ANIMATION ENGINE ============== */
const sticky = document.getElementById('sticky');
const label = document.getElementById('label');
const bubble = document.getElementById('bubble');
const sceneObjects = document.getElementById('sceneObjects');
const armL = document.getElementById('armL');
const armR = document.getElementById('armR');
const thumb = document.getElementById('thumb');
const mouth = document.getElementById('mouth');
const eyeL = document.getElementById('eyeL');
const eyeR = document.getElementById('eyeR');
const blinkL = document.getElementById('blinkL');
const blinkR = document.getElementById('blinkR');
const blinkLineL = document.getElementById('blinkLineL');
const blinkLineR = document.getElementById('blinkLineR');

let animId = null;
let timeouts = [];

// Blink
setInterval(()=>{
  blinkL.style.opacity='1';blinkR.style.opacity='1';
  blinkLineL.style.opacity='1';blinkLineR.style.opacity='1';
  eyeL.style.opacity='0';eyeR.style.opacity='0';
  setTimeout(()=>{
    blinkL.style.opacity='0';blinkR.style.opacity='0';
    blinkLineL.style.opacity='0';blinkLineR.style.opacity='0';
    eyeL.style.opacity='1';eyeR.style.opacity='1';
  },120);
},3000);

function clearAll(){
  cancelAnimationFrame(animId);
  timeouts.forEach(t=>clearTimeout(t));
  timeouts=[];
  sceneObjects.innerHTML='';
  bubble.style.opacity='0';bubble.style.transform='scale(0)';
  sticky.style.transform='';sticky.style.transition='none';sticky.style.left='60px';
  armL.setAttribute('d','M58,105 Q30,110 20,130');
  armR.setAttribute('d','M102,105 Q130,100 140,80');
  thumb.setAttribute('d','M140,80 L137,72');
  thumb.style.opacity='1';
  mouth.setAttribute('d','M68 58 Q80 70 92 58');
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
}

function showBubble(html,delay=0){
  timeouts.push(setTimeout(()=>{
    bubble.innerHTML=html;
    bubble.style.opacity='1';bubble.style.transform='scale(1)';
  },delay));
}

function addObj(id,x,y,content,cls,delay){
  const d=document.createElement('div');
  d.className='obj';d.id=id;
  d.style.left=x+'px';d.style.top=y+'px';d.style.transform='scale(0)';
  d.innerHTML=content;
  sceneObjects.appendChild(d);
  timeouts.push(setTimeout(()=>d.classList.add('show'),delay||0));
}

function gesturePoint(t){
  const s=Math.sin(t*2)*8;
  armR.setAttribute('d',`M102,105 Q135,85 ${148+s},${70+Math.cos(t*2)*5}`);
  thumb.setAttribute('d',`M${148+s},${70+Math.cos(t*2)*5} L${146+s},${62+Math.cos(t*2)*5}`);
}

function triggerTalkGesture(){
  let t=0;
  cancelAnimationFrame(animId);
  function a(){
    t+=0.08;
    armR.setAttribute('d',`M102,105 Q${130+Math.sin(t*3)*12},${95+Math.cos(t*3)*10} ${145+Math.sin(t*3)*8},${75+Math.cos(t*3)*12}`);
    thumb.style.opacity='0';
    if(t<3) animId=requestAnimationFrame(a);
    else{
      armR.setAttribute('d','M102,105 Q130,100 140,80');
      thumb.setAttribute('d','M140,80 L137,72');
      thumb.style.opacity='1';
    }
  }
  a();
}

function play(scene){
  clearAll();
  document.getElementById({bridge:'b1',focus:'b2',iot:'b3',ivv:'b4',api:'b5',pbi:'b6'}[scene])?.classList.add('active');
  scenes[scene]();
}

/* ============== SCENES ============== */
const scenes = {

  bridge(){
    label.textContent='BRIDGE — MANAGEMENT ↔ COMMITTEES';
    addObj('mgmt',340,70,`<div class="icon-box orange">🏢</div><div class="icon-label" style="margin-top:4px">Management</div>`,'',200);
    addObj('qual',520,70,`<div class="icon-box green">✅</div><div class="icon-label" style="margin-top:4px">Quality Dept</div>`,'',400);
    addObj('com1',340,220,`<div class="icon-box blue">📝</div><div class="icon-label" style="margin-top:4px">Committee A</div>`,'',600);
    addObj('com2',450,260,`<div class="icon-box blue">📝</div><div class="icon-label" style="margin-top:4px">Committee B</div>`,'',700);
    addObj('com3',560,220,`<div class="icon-box purple">🌐</div><div class="icon-label" style="margin-top:4px">Cross-func.</div>`,'',800);
    timeouts.push(setTimeout(()=>{
      [{x:200,y:180,w:160,a:-30},{x:200,y:190,w:180,a:10},{x:200,y:185,w:200,a:20},{x:200,y:175,w:370,a:-2},{x:200,y:185,w:400,a:12}].forEach((l,i)=>{
        const el=document.createElement('div');
        el.style.cssText=`position:absolute;left:${l.x}px;top:${l.y}px;width:0;transform:rotate(${l.a}deg);transition:width .6s ease ${i*.12}s;border-top:2px dashed #C8D64B;height:0`;
        sceneObjects.appendChild(el);
        requestAnimationFrame(()=>el.style.width=l.w+'px');
      });
    },900));
    let t=0;
    (function a(){t+=0.04;gesturePoint(t);armL.setAttribute('d',`M58,105 Q${30+Math.sin(t*1.3)*5},110 20,${125+Math.sin(t)*8}`);if(t<12)animId=requestAnimationFrame(a)})();
    showBubble('I act as the <b>link</b> between management, quality committees, and cross-functional teams.',500);
  },

  focus(){
    label.textContent='FOCUS GROUPS — PROCESSES, METHODS & TOOLS';
    [{e:'🔧',l:'Processes',x:350,y:80,c:'green',d:200},{e:'📐',l:'Methods',x:500,y:80,c:'blue',d:400},{e:'🛠️',l:'Tools',x:650,y:80,c:'orange',d:600},{e:'📜',l:'Regulations',x:420,y:220,c:'purple',d:800},{e:'🎯',l:'Objectives',x:570,y:220,c:'red',d:900}].forEach(g=>{
      addObj('fg_'+g.l,g.x,g.y,`<div class="icon-box ${g.c}">${g.e}</div><div class="icon-label" style="margin-top:4px">${g.l}</div>`,'',g.d);
    });
    timeouts.push(setTimeout(()=>{
      const a=document.createElement('div');
      a.style.cssText='position:absolute;left:420px;top:170px;font-size:14px;font-weight:800;color:#999;letter-spacing:3px;opacity:0;transition:opacity .4s';
      a.textContent='⟱  aligned  ⟱';sceneObjects.appendChild(a);
      requestAnimationFrame(()=>a.style.opacity='1');
    },1000));
    let t=0;
    (function a(){t+=0.04;armR.setAttribute('d',`M102,105 Q130,${90+Math.sin(t*2)*15} 145,${75+Math.sin(t*2)*20}`);armL.setAttribute('d',`M58,105 Q30,${90+Math.cos(t*2)*15} 15,${75+Math.cos(t*2)*20}`);thumb.style.opacity='0';if(t<12)animId=requestAnimationFrame(a)})();
    showBubble('I coordinate <b>focus groups</b> that develop and improve processes, methods & tools — aligned with regulations and objectives.',500);
  },

  iot(){
    label.textContent='IoT EXPERT — DIRECT CONTRIBUTION';
    addObj('iot1',320,60,`<div class="icon-box teal" style="width:70px;height:70px;font-size:34px">📡</div><div class="icon-label" style="margin-top:4px">Sensors</div>`,'',200);
    addObj('iot2',480,55,`<div class="icon-box blue" style="width:70px;height:70px;font-size:34px">☁️</div><div class="icon-label" style="margin-top:4px">Cloud</div>`,'',400);
    addObj('iot3',640,60,`<div class="icon-box green" style="width:70px;height:70px;font-size:34px">📱</div><div class="icon-label" style="margin-top:4px">Apps</div>`,'',600);
    timeouts.push(setTimeout(()=>{
      ['400,95,60','560,95,60'].forEach((v,i)=>{
        const[x,y,w]=v.split(',');
        const el=document.createElement('div');
        el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:0;height:3px;background:#6ECFBD;transition:width .5s ease ${i*.2}s;border-radius:2px`;
        sceneObjects.appendChild(el);requestAnimationFrame(()=>el.style.width=w+'px');
      });
    },700));
    timeouts.push(setTimeout(()=>{
      for(let i=0;i<6;i++){const d=document.createElement('div');d.style.cssText=`position:absolute;width:8px;height:8px;border-radius:50%;background:#C8D64B;top:${90+Math.random()*10}px;left:${390+Math.random()*230}px;opacity:0;animation:pulse 1.5s ease ${i*.3}s infinite`;sceneObjects.appendChild(d)}
      const s=document.createElement('style');s.textContent='@keyframes pulse{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(0)}}';sceneObjects.appendChild(s);
    },900));
    addObj('badge',380,200,`<div style="background:#222;color:#C8D64B;padding:10px 24px;border-radius:30px;font-weight:800;font-size:14px;letter-spacing:1px">⚡ IoT EXPERT</div>`,'',1000);
    let t=0;(function a(){t+=0.05;gesturePoint(t);if(t<12)animId=requestAnimationFrame(a)})();
    showBubble('I contribute directly as an <b>expert in the IoT space</b> — sensors, cloud, and connected applications.',500);
  },

  ivv(){
    label.textContent='IVV — INTEGRATION, VERIFICATION & VALIDATION';
    timeouts.push(setTimeout(()=>{
      const h=document.createElement('div');
      h.style.cssText='position:absolute;left:320px;top:50px;width:380px;height:280px;opacity:0;transition:opacity .8s ease';
